<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip 7 Offline</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #E4E3E0; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        @keyframes slamIn {
            0% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-slam { animation: slamIn 0.2s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Utilities ---
        const nanoid = () => Math.random().toString(36).substr(2, 9);
        
        const shuffle = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const createDeck = () => {
            const deck = [];
            for (let i = 1; i <= 12; i++) {
                for (let j = 0; j < i; j++) {
                    deck.push({ id: nanoid(), type: i, value: i });
                }
            }
            for (let i = 0; i < 3; i++) deck.push({ id: nanoid(), type: 'FLIP3', value: 0 });
            for (let i = 0; i < 3; i++) deck.push({ id: nanoid(), type: 'FREEZE', value: 0 });
            for (let i = 0; i < 2; i++) deck.push({ id: nanoid(), type: 'DOUBLE', value: 0 });
            for (let i = 0; i < 2; i++) deck.push({ id: nanoid(), type: 'SECOND_CHANCE', value: 0 });
            return shuffle(deck);
        };

        // --- Components ---

        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const CardView = ({ card, isNew, isDuplicate }) => {
            const getCardContent = () => {
                if (typeof card.type === 'number') {
                    return (
                        <div className="flex flex-col items-center justify-center h-full">
                            <span className="text-3xl font-black">{card.type}</span>
                            <div className="grid grid-cols-3 gap-1 mt-1">
                                {Array.from({ length: Math.min(card.type, 9) }).map((_, i) => (
                                    <div key={i} className="w-1 h-1 bg-current rounded-full" />
                                ))}
                            </div>
                        </div>
                    );
                }
                switch (card.type) {
                    case 'FLIP3': return <div className="flex flex-col items-center"><Icon name="zap" className="w-6 h-6 mb-1" /><span className="text-[8px] font-bold">FLIP 3</span></div>;
                    case 'FREEZE': return <div className="flex flex-col items-center"><Icon name="snowflake" className="w-6 h-6 mb-1" /><span className="text-[8px] font-bold">FREEZE</span></div>;
                    case 'DOUBLE': return <div className="flex flex-col items-center"><Icon name="trending-up" className="w-6 h-6 mb-1" /><span className="text-[8px] font-bold">DOUBLE</span></div>;
                    case 'SECOND_CHANCE': return <div className="flex flex-col items-center"><Icon name="shield" className="w-6 h-6 mb-1" /><span className="text-[8px] font-bold">2ND CHANCE</span></div>;
                }
            };

            const getCardColor = () => {
                if (typeof card.type === 'number') {
                    if (isDuplicate) return 'bg-rose-500 text-white border-rose-600 shadow-lg shadow-rose-500/50';
                    if (card.type <= 4) return 'bg-slate-50 text-slate-800 border-slate-200';
                    if (card.type <= 8) return 'bg-blue-50 text-blue-800 border-blue-200';
                    return 'bg-indigo-50 text-indigo-800 border-indigo-200';
                }
                switch (card.type) {
                    case 'FLIP3': return 'bg-yellow-50 text-yellow-800 border-yellow-300';
                    case 'FREEZE': return 'bg-cyan-50 text-cyan-800 border-cyan-300';
                    case 'DOUBLE': return 'bg-emerald-50 text-emerald-800 border-emerald-300';
                    case 'SECOND_CHANCE': return 'bg-rose-50 text-rose-800 border-rose-300';
                }
            };

            return (
                <div className={`w-20 h-28 rounded-xl border-2 flex items-center justify-center transition-all ${getCardColor()} ${isNew ? 'animate-slam' : ''} card-shadow`}>
                    {getCardContent()}
                </div>
            );
        };

        const App = () => {
            const [gameState, setGameState] = useState({
                status: 'START', // START, PLAYING, GAME_OVER
                players: [],
                currentPlayerIndex: 0,
                deck: [],
                discardPile: [],
                logs: ["Welcome to Flip 7!"],
                isBusting: false
            });
            const [botCount, setBotCount] = useState(1);
            const [playerName, setPlayerName] = useState('');
            const logEndRef = useRef(null);

            useEffect(() => {
                logEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [gameState.logs]);

            useEffect(() => {
                const currentPlayer = gameState.players[gameState.currentPlayerIndex];
                if (gameState.status === 'PLAYING' && currentPlayer?.isBot) {
                    const timer = setTimeout(() => {
                        const turnScore = currentPlayer.currentTurnCards.reduce((acc, c) => acc + c.value, 0);
                        const cardCount = currentPlayer.currentTurnCards.length;
                        
                        if (cardCount < 3 || (turnScore < 15 && cardCount < 5)) {
                            handleFlip();
                        } else {
                            handleBank();
                        }
                    }, 1000);
                    return () => clearTimeout(timer);
                }
            }, [gameState.currentPlayerIndex, gameState.status, gameState.players[gameState.currentPlayerIndex]?.currentTurnCards.length]);

            const addLog = (msg) => {
                setGameState(prev => ({
                    ...prev,
                    logs: [...prev.logs.slice(-19), msg]
                }));
            };

            const initGame = () => {
                const newPlayers = [
                    { id: 'human', name: playerName || 'Player', isBot: false, score: 0, currentTurnCards: [], hasSecondChance: false, isDoubled: false }
                ];
                for (let i = 0; i < botCount; i++) {
                    newPlayers.push({ id: `bot-${i}`, name: `Bot ${i + 1}`, isBot: true, score: 0, currentTurnCards: [], hasSecondChance: false, isDoubled: false });
                }
                setGameState({
                    status: 'PLAYING',
                    players: newPlayers,
                    currentPlayerIndex: 0,
                    deck: createDeck(),
                    discardPile: [],
                    logs: ["Game started!"],
                    isBusting: false
                });
            };

            const handleFlip = () => {
                setGameState(prev => {
                    if (prev.status !== 'PLAYING') return prev;
                    
                    let newDeck = [...prev.deck];
                    let newDiscard = [...prev.discardPile];
                    let newLogs = [...prev.logs];
                    
                    if (newDeck.length === 0) {
                        newDeck = shuffle(newDiscard);
                        newDiscard = [];
                        newLogs.push("Deck reshuffled.");
                    }

                    const card = newDeck.pop();
                    const newPlayers = [...prev.players];
                    const player = { ...newPlayers[prev.currentPlayerIndex] };
                    newPlayers[prev.currentPlayerIndex] = player;
                    
                    player.currentTurnCards = [...player.currentTurnCards, card];
                    newLogs.push(`${player.name} flipped ${typeof card.type === 'number' ? card.value : card.type}.`);

                    // Check bust
                    const numbers = player.currentTurnCards.filter(c => typeof c.type === 'number');
                    const duplicates = numbers.filter((c, index) => numbers.findIndex(n => n.type === c.type) !== index);

                    let nextIndex = prev.currentPlayerIndex;

                    if (duplicates.length > 0) {
                        if (player.hasSecondChance) {
                            player.hasSecondChance = false;
                            player.currentTurnCards = player.currentTurnCards.filter(c => c.id !== card.id);
                            newDiscard.push(card);
                            newLogs.push(`${player.name} used Second Chance!`);
                        } else {
                            newLogs.push(`${player.name} busted!`);
                            // Don't move to next turn yet, set isBusting flag
                            setTimeout(() => {
                                setGameState(current => {
                                    const updatedPlayers = [...current.players];
                                    const p = { ...updatedPlayers[current.currentPlayerIndex] };
                                    updatedPlayers[current.currentPlayerIndex] = p;
                                    const cardsToDiscard = [...p.currentTurnCards];
                                    p.currentTurnCards = [];
                                    p.isDoubled = false;
                                    p.hasSecondChance = false;
                                    return {
                                        ...current,
                                        players: updatedPlayers,
                                        discardPile: [...current.discardPile, ...cardsToDiscard],
                                        currentPlayerIndex: (current.currentPlayerIndex + 1) % updatedPlayers.length,
                                        isBusting: false
                                    };
                                });
                            }, 3000);
                            
                            return {
                                ...prev,
                                players: newPlayers,
                                deck: newDeck,
                                discardPile: newDiscard,
                                logs: newLogs.slice(-19),
                                isBusting: true
                            };
                        }
                    } else {
                        // Special cards
                        if (card.type === 'FREEZE') {
                            newLogs.push("FREEZE! Auto-banking.");
                            // We handle banking logic directly here to avoid double state updates
                            let turnScore = player.currentTurnCards.reduce((acc, c) => acc + c.value, 0);
                            if (player.isDoubled) turnScore *= 2;
                            player.score += turnScore;
                            newLogs.push(`${player.name} banked ${turnScore} pts. Total: ${player.score}`);
                            newDiscard = [...newDiscard, ...player.currentTurnCards];
                            player.currentTurnCards = [];
                            player.isDoubled = false;
                            player.hasSecondChance = false;

                            if (player.score >= 200) {
                                return {
                                    ...prev,
                                    status: 'GAME_OVER',
                                    players: newPlayers,
                                    deck: newDeck,
                                    discardPile: newDiscard,
                                    logs: [...newLogs.slice(-19), `${player.name} wins!`]
                                };
                            }
                            nextIndex = (prev.currentPlayerIndex + 1) % newPlayers.length;
                        } else if (card.type === 'DOUBLE') {
                            player.isDoubled = true;
                        } else if (card.type === 'SECOND_CHANCE') {
                            player.hasSecondChance = true;
                        }
                    }

                    return {
                        ...prev,
                        players: newPlayers,
                        deck: newDeck,
                        discardPile: newDiscard,
                        currentPlayerIndex: nextIndex,
                        logs: newLogs.slice(-19)
                    };
                });
            };

            const handleBank = () => {
                setGameState(prev => {
                    const newPlayers = [...prev.players];
                    const player = { ...newPlayers[prev.currentPlayerIndex] };
                    newPlayers[prev.currentPlayerIndex] = player;
                    
                    let turnScore = player.currentTurnCards.reduce((acc, c) => acc + c.value, 0);
                    if (player.isDoubled) turnScore *= 2;
                    
                    player.score += turnScore;
                    const newLogs = [...prev.logs, `${player.name} banked ${turnScore} pts. Total: ${player.score}`];
                    
                    const newDiscard = [...prev.discardPile, ...player.currentTurnCards];
                    player.currentTurnCards = [];
                    player.isDoubled = false;
                    player.hasSecondChance = false;

                    if (player.score >= 200) {
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        return {
                            ...prev,
                            status: 'GAME_OVER',
                            players: newPlayers,
                            discardPile: newDiscard,
                            logs: [...newLogs.slice(-19), `${player.name} wins!`]
                        };
                    }

                    return {
                        ...prev,
                        players: newPlayers,
                        discardPile: newDiscard,
                        currentPlayerIndex: (prev.currentPlayerIndex + 1) % newPlayers.length,
                        logs: newLogs.slice(-19)
                    };
                });
            };

            if (gameState.status === 'START') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl p-8 shadow-2xl border border-black/5">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="w-12 h-12 bg-black rounded-xl flex items-center justify-center text-white font-black text-2xl italic">7</div>
                                <h1 className="text-3xl font-black tracking-tighter italic">FLIP 7 OFFLINE</h1>
                            </div>
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-[10px] font-bold uppercase tracking-widest text-black/40 mb-2">Your Name</label>
                                    <input type="text" value={playerName} onChange={e => setPlayerName(e.target.value)} placeholder="Enter name..." className="w-full px-4 py-3 rounded-xl border-2 border-black/10 focus:border-black outline-none font-medium" />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold uppercase tracking-widest text-black/40 mb-2">Opponent Bots ({botCount})</label>
                                    <div className="flex gap-2">
                                        {[1, 2, 3, 4].map(n => (
                                            <button key={n} onClick={() => setBotCount(n)} className={`flex-1 py-2 rounded-lg border-2 font-bold transition-all ${botCount === n ? 'bg-black text-white border-black' : 'bg-white text-black border-black/10 hover:border-black/30'}`}>{n}</button>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={initGame} className="w-full bg-black text-white py-4 rounded-2xl font-bold text-lg hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-black/20">START GAME</button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentPlayer = gameState.players[gameState.currentPlayerIndex];
            const isMyTurn = currentPlayer && !currentPlayer.isBot && !gameState.isBusting;

            // Find duplicates for highlighting
            const numbers = currentPlayer?.currentTurnCards.filter(c => typeof c.type === 'number') || [];
            const duplicateTypes = numbers.filter((c, index) => numbers.findIndex(n => n.type === c.type) !== index).map(c => c.type);

            return (
                <div className="h-screen flex flex-col md:flex-row overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-full md:w-72 bg-white border-r border-black/5 flex flex-col h-full">
                        <div className="p-6 border-b border-black/5">
                            <h2 className="text-xl font-black italic tracking-tighter mb-6">FLIP 7</h2>
                            <div className="space-y-3">
                                {gameState.players.map((p, idx) => (
                                    <div key={p.id} className={`p-3 rounded-xl border-2 transition-all flex items-center justify-between ${idx === gameState.currentPlayerIndex ? 'border-black bg-black/5' : 'border-transparent opacity-40'}`}>
                                        <div className="flex items-center gap-3">
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ${p.isBot ? 'bg-slate-200' : 'bg-black text-white'}`}>{p.isBot ? 'B' : p.name[0]}</div>
                                            <div>
                                                <div className="text-sm font-bold leading-none mb-1">{p.name}</div>
                                                <div className="text-[10px] font-bold text-black/40 uppercase">{p.score} PTS</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="flex-1 overflow-hidden flex flex-col">
                            <div className="p-4 text-[10px] font-bold uppercase tracking-widest text-black/30">Game Log</div>
                            <div className="flex-1 overflow-y-auto px-4 pb-4 space-y-1">
                                {gameState.logs.map((log, i) => <div key={i} className="text-[10px] font-medium text-black/60 border-l-2 border-black/5 pl-2 py-0.5">{log}</div>)}
                                <div ref={logEndRef} />
                            </div>
                        </div>
                    </div>

                    {/* Main Area */}
                    <div className="flex-1 flex flex-col p-6 md:p-12">
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <div className="text-center mb-8">
                                <h3 className="text-[10px] font-bold uppercase tracking-[0.3em] text-black/30 mb-2">{isMyTurn ? "YOUR TURN" : `${currentPlayer?.name}'S TURN`}</h3>
                                <div className="text-6xl font-black italic tracking-tighter flex items-center justify-center gap-3">
                                    {currentPlayer?.currentTurnCards.reduce((acc, c) => acc + c.value, 0) * (currentPlayer?.isDoubled ? 2 : 1)}
                                    {currentPlayer?.isDoubled && <span className="text-emerald-500 text-2xl">x2</span>}
                                </div>
                                {currentPlayer?.hasSecondChance && <div className="mt-2 px-3 py-1 bg-rose-100 text-rose-800 text-[10px] font-bold rounded-full border border-rose-200 inline-block">2ND CHANCE ACTIVE</div>}
                            </div>

                            <div className="flex flex-wrap justify-center gap-3 max-w-3xl">
                                {currentPlayer?.currentTurnCards.map((card, i) => (
                                    <CardView 
                                        key={card.id} 
                                        card={card} 
                                        isNew={i === currentPlayer.currentTurnCards.length - 1} 
                                        isDuplicate={gameState.isBusting && duplicateTypes.includes(card.type)}
                                    />
                                ))}
                                {currentPlayer?.currentTurnCards.length === 0 && <div className="w-20 h-28 rounded-xl border-2 border-dashed border-black/10 flex items-center justify-center text-black/10"><Icon name="play" className="w-8 h-8" /></div>}
                            </div>
                        </div>

                        <div className="h-32 flex items-center justify-center gap-4 relative">
                            {gameState.isBusting && (
                                <div className="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
                                    <div className="bg-rose-600 text-white px-8 py-4 rounded-2xl font-black text-4xl italic tracking-tighter shadow-2xl shadow-rose-600/50 rotate-[-5deg] animate-slam">
                                        BUST!
                                    </div>
                                </div>
                            )}
                            {gameState.status === 'GAME_OVER' ? (
                                <button onClick={() => setGameState(prev => ({ ...prev, status: 'START' }))} className="px-12 py-4 bg-black text-white rounded-2xl font-bold text-xl shadow-xl">PLAY AGAIN</button>
                            ) : (
                                <>
                                    <button id="flip-btn" disabled={!isMyTurn} onClick={handleFlip} className={`h-16 px-10 rounded-2xl font-black text-lg transition-all shadow-lg ${isMyTurn ? 'bg-black text-white hover:scale-105 active:scale-95' : 'bg-black/5 text-black/20 cursor-not-allowed'}`}>FLIP CARD</button>
                                    <button id="bank-btn" disabled={!isMyTurn || currentPlayer?.currentTurnCards.length === 0} onClick={() => handleBank()} className={`h-16 px-10 rounded-2xl font-black text-lg transition-all shadow-lg ${isMyTurn && currentPlayer?.currentTurnCards.length > 0 ? 'bg-white text-black border-2 border-black hover:scale-105 active:scale-95' : 'bg-black/5 text-black/20 cursor-not-allowed'}`}>BANK POINTS</button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
